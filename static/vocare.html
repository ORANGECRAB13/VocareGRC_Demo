<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="oklch(0.60 0.13 187)" />
  <title>Vocare — Live Translation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        oklch(0.60 0.13 187);
      --teal-light:  oklch(0.94 0.05 187);
      --teal-mid:    oklch(0.75 0.10 187);
      --amber:       oklch(0.47 0.20 22);
      --amber-light: oklch(0.95 0.05 22);
      --bg:          oklch(0.97 0.01 240);
      --surface:     #ffffff;
      --surface2:    oklch(0.96 0.008 240);
      --text-primary:oklch(0.14 0.02 240);
      --text-muted:  oklch(0.52 0.02 240);
      --text-faint:  oklch(0.75 0.01 240);
      --border:      oklch(0.90 0.01 240);
      --error:       oklch(0.52 0.18 22);
      --error-light: oklch(0.96 0.04 22);
      --success:     oklch(0.52 0.14 158);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--text-primary);
    }

    #root {
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      background: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    input, select, textarea {
      font-family: 'DM Sans', sans-serif;
    }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Keyframe animations ── */

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.0); }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes dot-blink {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.85); }
      40%           { opacity: 1;    transform: scale(1); }
    }

    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/static/vocare-app.jsx"></script>
</body>
</html>
