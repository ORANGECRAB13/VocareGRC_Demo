services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/vocare2026
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
